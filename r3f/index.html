<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Three.js 무지개 삼각형</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    canvas { display: block; }
  </style>
  <!-- Three.js 라이브러리 로드 -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com",
        "three/addons/": "https://unpkg.com"
      }
    }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from 'three';

    // 1. Scene, Camera, Renderer 설정
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. 삼각형 Geometry 정의 (꼭짓점 위치)
    const vertices = new Float32Array([
       0.0,  1.5, 0.0, // 상단 꼭짓점
      -1.5, -1.5, 0.0, // 좌측 하단 꼭짓점
       1.5, -1.5, 0.0  // 우측 하단 꼭짓점
    ]);

    // 3. 무지개 색상 정의 (각 꼭짓점마다 색상 지정)
    const colors = new Float32Array([
      1.0, 0.0, 0.0, // 빨간색 (상단)
      0.0, 1.0, 0.0, // 초록색 (좌측)
      0.0, 0.0, 1.0  // 파란색 (우측)
    ]);

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    // 4. Material 설정 (버텍스 컬러 사용)
    const material = new THREE.MeshBasicMaterial({ 
      vertexColors: true, 
      side: THREE.DoubleSide 
    });

    const triangle = new THREE.Mesh(geometry, material);
    scene.add(triangle);

    // 5. 애니메이션 루프 (삼각형 회전)
    function animate() {
      requestAnimationFrame(animate);

      // Y축과 X축 기준으로 회전
      triangle.rotation.y += 0.01;
      triangle.rotation.x += 0.01;

      renderer.render(scene, camera);
    }

    animate();

    // 6. 창 크기 조절 대응
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
